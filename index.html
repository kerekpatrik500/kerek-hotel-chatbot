<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerék Hotel – AI Asszisztens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --dark: #141414;
    --dark2: #1e1e1e;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f8f4ee;
    --cream2: #f0ebe2;
    --text: #2a2a2a;
    --muted: #888;
    --border: rgba(0,0,0,0.1);
    --radius: 16px;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.04) 0%, transparent 50%);
  }

  .chat-container {
    width: 100%;
    max-width: 480px;
    height: 90vh;
    max-height: 760px;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.12), 0 4px 16px rgba(0,0,0,0.06);
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .header {
    background: var(--dark);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .logo {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.5);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px; font-weight: 500;
    color: var(--gold);
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .header-text { flex: 1; }

  .hotel-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px; font-weight: 400;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .hotel-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    margin-top: 1px;
    letter-spacing: 0.3px;
  }

  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: rgba(255,255,255,0.45);
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.5);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .quick-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--cream);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .quick-tabs::-webkit-scrollbar { display: none; }

  .tab {
    white-space: nowrap;
    padding: 6px 13px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
  }

  .tab:hover { border-color: var(--gold); color: var(--text); }

  .tab.active {
    background: var(--dark);
    color: var(--gold);
    border-color: var(--dark);
  }

  .tab svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .msg { display: flex; gap: 10px; align-items: flex-end; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px; color: var(--gold);
    font-weight: 500;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 15px;
    font-size: 13.5px;
    line-height: 1.6;
    border-radius: 18px;
  }

  .msg.bot .bubble {
    background: var(--cream);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .msg.user .bubble {
    background: var(--dark);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .typing-bubble {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 13px 16px;
    display: flex; gap: 5px; align-items: center;
  }

  .typing-bubble span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .input-area {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    background: #fff;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    min-height: 42px;
    max-height: 80px;
    background: var(--cream);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }

  textarea:focus { border-color: var(--gold); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--dark);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .send-btn:hover { background: #2a2a2a; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

  .send-btn svg {
    width: 16px; height: 16px;
    stroke: var(--gold);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    margin-left: 1px;
  }

  .divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 4px 0;
    letter-spacing: 0.5px;
  }

  @media (max-width: 520px) {
    body { padding: 0; align-items: flex-end; }
    .chat-container { max-width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; border-radius: 20px 20px 0 0; }
  }
 .faq-list { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.faq-item { background: var(--cream); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; cursor: pointer; }
.faq-q { font-size: 13px; font-weight: 500; color: var(--text); }
.faq-a { font-size: 12.5px; color: var(--muted); margin-top: 6px; display: none; line-height: 1.5; }
.faq-item.open .faq-a { display: block; }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="logo">KH</div>
    <div class="header-text">
      <div class="hotel-name">Kerék Hotel</div>
      <div class="hotel-sub">AI Asszisztens</div>
    </div>
    <div class="status">
      <div class="dot"></div>
      Online
    </div>
  </div>

  <div class="quick-tabs" id="tabs">
    <button class="tab" onclick="quickAsk('Milyen szobatípusok elérhetők?', this)">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Szobák
    </button>
    <button class="tab" onclick="quickAsk('Mik az aktuális szobárak?', this)">
      <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Árak
    </button>
    <button class="tab" onclick="quickAsk('Mondjon többet az étteremről!', this)">
      <svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
      Étterem
    </button>
    <button class="tab" onclick="quickAsk('Milyen wellness szolgáltatásaik vannak?', this)">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Wellness
    </button>
    <button class="tab" onclick="quickAsk('Hogyan lehet megközelíteni a hotelt?', this)">
      <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      Megközelítés
    </button>
    <button class="tab" onclick="quickAsk('Hogyan tudok szobát foglalni?', this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Foglalás
    </button>
    <button class="tab" onclick="quickAsk('Milyen programok vannak a közelben?', this)">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Programok
    </button>
   <button class="tab" onclick="showKalkulator(this)">
  <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
  Árajánlat
</button>
   <button class="tab" onclick="showFaq(this)">
    
  <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  GYIK
</button>
  </div>

  <div class="messages" id="messages">
    <div class="divider">Ma</div>
    <div class="msg bot">
      <div class="avatar">KH</div>
      <div class="bubble">Üdvözöljük a Kerék Hotelben! Miben segíthetek Önnek? Kérdezhet szobáinkról, foglalásról, étteremről vagy bármilyen más szolgáltatásunkról.</div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Írjon üzenetet..." rows="1"
      onkeydown="handleKey(event)"
      oninput="this.style.height='42px'; this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()" aria-label="Küldés">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
let history = [];
let busy = false;

async function send(text) {
  const input = document.getElementById('input');
  const msg = text || input.value.trim();
  if (!msg || busy) return;

  input.value = '';
  input.style.height = '42px';

  addMsg('user', msg);
  history.push({ role: 'user', content: msg });
  busy = true;
  document.getElementById('sendBtn').disabled = true;

  const typingId = addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const data = await res.json();
    removeEl(typingId);

    if (data.error) {
      addMsg('bot', 'Sajnálom, technikai hiba lépett fel: ' + data.error);
    } else {
      addMsg('bot', data.reply);
      history.push({ role: 'assistant', content: data.reply });
    }
  } catch(e) {
    removeEl(typingId);
    addMsg('bot', 'Sajnálom, nem sikerült kapcsolódni a szerverhez.');
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

function quickAsk(q, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  send(q);
}

function addMsg(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = role === 'bot' ? '<div class="avatar">KH</div>' : '';
  div.innerHTML = avatar + '<div class="bubble">' + esc(text) + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

let tid = 0;
function addTyping() {
  const id = 'typing-' + (++tid);
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = id;
  div.innerHTML = '<div class="avatar">KH</div><div class="typing-bubble"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function removeEl(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
 function showFaq(btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `<div class="faq-list">
    ${[
      ['Mi a check-in és check-out időpontja?', 'Check-in: 14:00, check-out: 12:00. Korai/késői érkezés előzetes egyeztetéssel lehetséges.'],
      ['Van ingyenes parkoló?', 'Igen, ingyenes zárt parkolóval rendelkezünk minden vendégünk számára.'],
      ['Mikor van a reggeli?', 'Büféreggelit kínálunk 7:00-10:30 között, 4.500 Ft/fő áron.'],
      ['Van wellness részleg?', 'Igen! Úszómedence, szauna és fitness terem ingyenesen elérhető. Masszázs előfoglalással kérhető.'],
      ['Hogyan lehet foglalni?', 'Telefonon (+36 22 555-100), emailen (info@kerekhotel.hu) vagy weboldalunkon online.'],
      ['Háziállat hozható?', 'Sajnos háziállatot nem tudunk fogadni szállodánkban.'],
      ['Van étterem a hotelben?', 'Igen, a Kerék Bisztró 12:00-22:00 között várja vendégeit magyar és mediterrán ételekkel.'],
    ].map(([q,a]) => `<div class="faq-item" onclick="this.classList.toggle('open')">
      <div class="faq-q">❓ ${q}</div>
      <div class="faq-a">${a}</div>
    </div>`).join('')}
  </div>`;
}
 function showKalkulator(btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `<div style="padding:16px; display:flex; flex-direction:column; gap:12px;">
    <div style="font-size:13px; font-weight:500; color:var(--text);">Árajánlat kalkulátor</div>
    
    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-size:12px; color:var(--muted);">Érkezés</label>
      <input type="date" id="erkezes" style="padding:8px 12px; border:1px solid var(--border); border-radius:10px; font-size:13px; background:var(--cream); color:var(--text);">
    </div>
    
    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-size:12px; color:var(--muted);">Távozás</label>
      <input type="date" id="tavozas" style="padding:8px 12px; border:1px solid var(--border); border-radius:10px; font-size:13px; background:var(--cream); color:var(--text);">
    </div>
    
    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-size:12px; color:var(--muted);">Szobatípus</label>
      <select id="szoba" style="padding:8px 12px; border:1px solid var(--border); border-radius:10px; font-size:13px; background:var(--cream); color:var(--text);">
        <option value="18900">Standard szoba – 18.900 Ft/éj</option>
        <option value="24900">Superior szoba – 24.900 Ft/éj</option>
        <option value="34900">Junior suite – 34.900 Ft/éj</option>
        <option value="49900">Deluxe suite – 49.900 Ft/éj</option>
      </select>
    </div>
    
    <div style="display:flex; flex-direction:column; gap:6px;">
      <label style="font-size:12px; color:var(--muted);">Személyek száma</label>
      <select id="szemelyek" style="padding:8px 12px; border:1px solid var(--border); border-radius:10px; font-size:13px; background:var(--cream); color:var(--text);">
        <option value="0">Reggeli nélkül</option>
        <option value="1">1 fő reggelivel</option>
        <option value="2">2 fő reggelivel</option>
        <option value="3">3 fő reggelivel</option>
        <option value="4">4 fő reggelivel</option>
      </select>
    </div>
    
    <button onclick="szamolAr()" style="padding:10px; background:var(--dark); color:#fff; border:none; border-radius:12px; font-size:13px; cursor:pointer; font-family:var(--font-sans);">Árajánlat kiszámítása</button>
    
    <div id="eredmeny" style="display:none; background:var(--cream); border:1px solid var(--border); border-radius:12px; padding:14px;">
    </div>
  </div>`;
}

function szamolAr() {
  const erkezes = new Date(document.getElementById('erkezes').value);
  const tavozas = new Date(document.getElementById('tavozas').value);
  const szobaar = parseInt(document.getElementById('szoba').value);
  const szemelyek = parseInt(document.getElementById('szemelyek').value);
  
  if (!document.getElementById('erkezes').value || !document.getElementById('tavozas').value) {
    alert('Kérjük adja meg az érkezés és távozás dátumát!');
    return;
  }
  
  const ejszakak = Math.round((tavozas - erkezes) / (1000 * 60 * 60 * 24));
  
  if (ejszakak <= 0) {
    alert('A távozás dátuma nem lehet korábbi mint az érkezés!');
    return;
  }
  
  const szobakolt = szobaar * ejszakak;
  const reggelikolt = szemelyek * 4500 * ejszakak;
  const osszesen = szobakolt + reggelikolt;
  
  const eredmeny = document.getElementById('eredmeny');
  eredmeny.style.display = 'block';
  eredmeny.innerHTML = `
    <div style="font-size:12px; font-weight:500; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.8px;">Árajánlat összefoglalója</div>
    <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px;">
      <span style="color:var(--muted);">Éjszakák száma</span>
      <span style="font-weight:500;">${ejszakak} éj</span>
    </div>
    <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px;">
      <span style="color:var(--muted);">Szállásdíj</span>
      <span style="font-weight:500;">${szobakolt.toLocaleString('hu-HU')} Ft</span>
    </div>
    ${szemelyek > 0 ? `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:13px;">
      <span style="color:var(--muted);">Reggeli (${szemelyek} fő × ${ejszakak} nap)</span>
      <span style="font-weight:500;">${reggelikolt.toLocaleString('hu-HU')} Ft</span>
    </div>` : ''}
    <div style="display:flex; justify-content:space-between; padding:8px 0; font-size:14px; font-weight:600;">
      <span>Összesen</span>
      <span style="color:var(--dark);">${osszesen.toLocaleString('hu-HU')} Ft</span>
    </div>
    <div style="margin-top:8px; font-size:11px; color:var(--muted);">Foglaláshoz hívjon minket: +36 22 555-100</div>
  `;
}
</script>
</body>
</html>
